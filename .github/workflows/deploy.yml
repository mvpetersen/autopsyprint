name: Deploy encrypted site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt index.html with StatiCrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "STATICRYPT_PASSWORD secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx --yes staticrypt index.html \
            -p "$STATICRYPT_PASSWORD" \
            -d _site \
            --template-title "AutopsyPrint" \
            --template-instructions "Password-protected preview for peer reviewers and collaborators." \
            --template-button "Unlock"

      - name: Inject noindex into unlock page
        run: |
          sed -i 's|<head>|<head><meta name="robots" content="noindex, nofollow" />|' _site/index.html

      - name: Write robots.txt
        run: |
          printf 'User-agent: *\nDisallow: /\n' > _site/robots.txt

      - name: Copy static assets
        run: |
          shopt -s nullglob
          for f in *.png *.jpg *.jpeg *.svg *.webp *.ico *.pdf; do
            cp "$f" _site/
          done
          if [ -d cases ] && [ -n "$(ls -A cases 2>/dev/null)" ]; then
            cp -r cases _site/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
